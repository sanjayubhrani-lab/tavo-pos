# Render.com blueprint — deploys the app + a managed PostgreSQL database.
# Push this repo to GitHub, then in Render: New → Blueprint → pick the repo.
# Render provisions everything below and gives you an HTTPS URL automatically.
services:
  - type: web
    name: tavo-pos
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true        # Render generates a strong secret
      - key: DATABASE_URL
        fromDatabase:
          name: platepoint-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: TAX_RATE
        value: "0.0825"
      # Add your Stripe keys in the Render dashboard (kept out of source control):
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: platepoint-db
    plan: free
    databaseName: platepoint
    user: platepoint
