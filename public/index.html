<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tavo POS</title>
<script src="https://js.stripe.com/v3/"></script>
<style>
  :root{--bg:#0f1115;--panel:#171a21;--panel2:#1e222b;--line:#2a2f3a;--txt:#e8ebf0;--mut:#9aa3b2;
    --brand:#ff5722;--brand2:#ff7a45;--green:#27c281;--red:#ef4d5a;--amber:#f5b042;--blue:#4d8df5;--radius:14px;--shadow:0 8px 30px rgba(0,0,0,.35)}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
  button{font-family:inherit;cursor:pointer;border:none;color:inherit}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#333a47;border-radius:8px}
  #app{display:flex;height:100vh}
  .sidebar{width:84px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:6px;flex-shrink:0}
  .logo{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;margin-bottom:10px;color:#fff}
  .nav{display:flex;flex-direction:column;gap:4px;width:100%;align-items:center;flex:1}
  .navbtn{width:64px;height:60px;border-radius:12px;background:transparent;color:var(--mut);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px;font-weight:600;transition:.15s}
  .navbtn .ic{font-size:20px}.navbtn:hover{background:var(--panel2);color:var(--txt)}.navbtn.active{background:var(--brand);color:#fff}
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{height:58px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px;gap:14px;background:var(--panel);flex-shrink:0}
  .topbar h1{font-size:16px;margin:0}.topbar .sub{color:var(--mut);font-size:12px}.spacer{flex:1}
  .pill{background:var(--panel2);border:1px solid var(--line);padding:6px 12px;border-radius:20px;font-size:12px;color:var(--mut)}.pill b{color:var(--txt)}
  .view{flex:1;overflow:auto;padding:18px}
  .pos{display:grid;grid-template-columns:1fr 380px;gap:16px;height:100%}
  .menuwrap{display:flex;flex-direction:column;min-height:0}
  .cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;flex-shrink:0}
  .cat{padding:9px 16px;border-radius:30px;background:var(--panel2);border:1px solid var(--line);font-size:13px;font-weight:600;white-space:nowrap;color:var(--mut)}
  .cat.active{background:var(--brand);border-color:var(--brand);color:#fff}
  .items{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;overflow:auto;align-content:start}
  .item{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;min-height:104px;display:flex;flex-direction:column;justify-content:space-between;text-align:left;transition:.12s}
  .item:hover{border-color:var(--brand);transform:translateY(-2px)}.item .emoji{font-size:26px}
  .item .nm{font-size:13px;font-weight:600;margin-top:6px;line-height:1.2}.item .pr{color:var(--green);font-weight:700;font-size:14px;margin-top:4px}
  .check{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);display:flex;flex-direction:column;min-height:0}
  .check .hd{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.check .hd h3{margin:0;font-size:15px}
  .check .lines{flex:1;overflow:auto;padding:8px 10px}
  .empty{color:var(--mut);text-align:center;padding:40px 10px;font-size:13px}
  .line{display:flex;gap:10px;padding:9px 8px;border-radius:10px;align-items:flex-start}.line:hover{background:var(--panel2)}
  .line .qty{background:var(--panel2);border:1px solid var(--line);border-radius:8px;min-width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .line .info{flex:1;min-width:0}.line .info .ln-nm{font-size:13px;font-weight:600}.line .info .ln-mod{font-size:11px;color:var(--mut);margin-top:2px}
  .line .ln-pr{font-weight:700;font-size:13px}.line .rm{color:var(--red);background:transparent;font-size:16px;padding:0 4px}
  .totals{padding:12px 16px;border-top:1px solid var(--line);font-size:13px}
  .totrow{display:flex;justify-content:space-between;padding:3px 0;color:var(--mut)}.totrow.big{color:var(--txt);font-weight:800;font-size:18px;padding-top:8px}
  .actions{padding:12px;display:flex;gap:8px}
  .btn{padding:13px;border-radius:12px;font-weight:700;font-size:14px;flex:1;text-align:center;transition:.12s}
  .btn.primary{background:var(--brand);color:#fff}.btn.primary:hover{background:var(--brand2)}
  .btn.ghost{background:var(--panel2);border:1px solid var(--line);color:var(--txt)}.btn.green{background:var(--green);color:#062a1c}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .grid{display:grid;gap:14px}.kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .card h4{margin:0 0 4px;font-size:13px;color:var(--mut);font-weight:600}.card .val{font-size:26px;font-weight:800}
  .delta{font-size:12px;margin-top:4px}.up{color:var(--green)}.sec-title{font-size:14px;font-weight:700;margin:6px 0 12px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
  table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;color:var(--mut);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line);font-size:12px}
  td{padding:11px 12px;border-bottom:1px solid var(--line)}tr:last-child td{border-bottom:none}
  .tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
  .tag.green{background:rgba(39,194,129,.15);color:var(--green)}.tag.amber{background:rgba(245,176,66,.15);color:var(--amber)}
  .tag.red{background:rgba(239,77,90,.15);color:var(--red)}.tag.blue{background:rgba(77,141,245,.15);color:var(--blue)}
  .floor{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
  .tbl{aspect-ratio:1;border-radius:var(--radius);border:2px solid var(--line);background:var(--panel);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-weight:700;transition:.12s}
  .tbl:hover{border-color:var(--brand)}.tbl.seated{border-color:var(--green);background:rgba(39,194,129,.07)}
  .tbl .tnum{font-size:22px}.tbl .tst{font-size:11px;color:var(--mut)}.seats{font-size:11px;color:var(--mut)}
  .kds{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;align-items:start}
  .ticket{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .ticket .thd{padding:10px 14px;background:var(--panel2);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line)}.ticket .thd .num{font-weight:800}
  .ticket .tbody{padding:12px 14px;font-size:13px}.ticket .tbody .it{padding:5px 0;border-bottom:1px dashed var(--line)}.ticket .tbody .it:last-child{border:none}
  .ticket .tbody .mods{color:var(--amber);font-size:11px;margin-left:14px}.ticket .tfoot{padding:10px 14px;border-top:1px solid var(--line)}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}.overlay.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;width:100%;max-width:460px;box-shadow:var(--shadow);max-height:90vh;overflow:auto}
  .mhd{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.mhd h3{margin:0;font-size:17px}
  .mbd{padding:20px}.x{background:transparent;font-size:22px;color:var(--mut)}
  .modrow{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 18px}
  .chip{padding:9px 14px;border-radius:30px;background:var(--panel2);border:1px solid var(--line);font-size:13px;font-weight:600}.chip.sel{background:var(--brand);border-color:var(--brand);color:#fff}
  .fld{margin-bottom:14px}.fld label{display:block;font-size:12px;color:var(--mut);margin-bottom:6px;font-weight:600}
  .fld input,.fld select{width:100%;padding:11px 12px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-size:14px}
  .tips{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:8px 0 16px}
  .tipbtn{padding:16px 8px;border-radius:12px;background:var(--panel2);border:2px solid var(--line);text-align:center}.tipbtn .p{font-size:18px;font-weight:800}.tipbtn .a{font-size:12px;color:var(--mut)}.tipbtn.sel{border-color:var(--green);background:rgba(39,194,129,.1)}
  .paymethods{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 0}
  .pm{padding:16px;border-radius:12px;background:var(--panel2);border:2px solid var(--line);text-align:center;font-weight:700;font-size:13px}.pm .ic{font-size:24px;display:block;margin-bottom:6px}.pm.sel{border-color:var(--brand)}
  .receipt{font-family:ui-monospace,Menlo,monospace;font-size:12.5px;background:#fff;color:#111;border-radius:10px;padding:20px}
  .receipt hr{border:none;border-top:1px dashed #999;margin:8px 0}.receipt .r{display:flex;justify-content:space-between}.receipt .c{text-align:center}
  .bar{height:8px;background:var(--panel2);border-radius:6px;overflow:hidden;margin-top:6px}.bar>i{display:block;height:100%;background:var(--brand)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--green);color:#062a1c;padding:13px 22px;border-radius:30px;font-weight:700;box-shadow:var(--shadow);transition:.3s;z-index:99}.toast.show{transform:translateX(-50%) translateY(0)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  #stripe-element{background:#fff;padding:12px;border-radius:10px;margin:10px 0}
  .modebadge{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);color:var(--mut)}
  /* printing: only #printArea shows on paper, sized for an 80mm receipt roll */
  #printArea{display:none}
  @media print{
    body{background:#fff}
    body *{visibility:hidden}
    #printArea,#printArea *{visibility:visible}
    #printArea{display:block;position:absolute;left:0;top:0;width:280px;color:#000;
      font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:12px;padding:6px}
    #printArea hr{border:none;border-top:1px dashed #000;margin:6px 0}
    #printArea .r{display:flex;justify-content:space-between}
    #printArea .c{text-align:center}
    @page{margin:6mm}
  }
</style>
</head>
<body>
<div id="app">
  <div class="sidebar">
    <div class="logo">T</div>
    <div class="nav" id="nav"></div>
  </div>
  <div class="main">
    <div class="topbar">
      <div><h1 id="vtitle">Order</h1><div class="sub" id="vsub">New check</div></div>
      <div class="spacer"></div>
      <span class="pill" id="connpill" onclick="flushOutbox()" style="cursor:pointer;color:var(--green)">🟢 Online</span>
      <span class="modebadge" id="modebadge">…</span>
      <div class="pill">📅 <b id="clock"></b></div>
    </div>
    <div class="view" id="view"></div>
  </div>
</div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toastEl"></div>
<div id="printArea"></div>

<script>
// API base: same-origin on the web; the hosted backend when running as a native
// (Capacitor) app. This is your branded custom domain on Render.
const BACKEND_URL = 'https://app.tavopoint.com';
const IS_NATIVE = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform())
  || location.protocol === 'capacitor:' || location.protocol === 'file:';
const API = IS_NATIVE ? BACKEND_URL : '';  // same origin on web, hosted backend on mobile
const $ = s => document.querySelector(s);
const money = n => '$' + Number(n).toFixed(2);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOKEN = localStorage.getItem('pp_token') || null;
let ME = null;  // {id, name, role, routes}

/* ===== OFFLINE ENGINE =====
   The POS keeps working when the network/server drops:
   - GET responses are cached so screens still render from last-known data
   - new orders and CASH payments are queued in an outbox (localStorage)
   - when the connection returns, the outbox auto-syncs to the server
   Card payments, refunds, voids and menu edits require a connection. */
let ONLINE = true;
let OUTBOX  = JSON.parse(localStorage.getItem('pp_outbox')  || '[]');  // [{type,tempId,payload}]
let PENDING = JSON.parse(localStorage.getItem('pp_pending') || '[]');  // local unsynced tickets
const saveOutbox  = () => { localStorage.setItem('pp_outbox',  JSON.stringify(OUTBOX));  updateConn(); };
const savePending = () => { localStorage.setItem('pp_pending', JSON.stringify(PENDING)); };
class OfflineError extends Error { constructor(m){ super(m); this.offline = true; } }
const isGet = o => !o.method || o.method === 'GET';
const cacheSet = (p,d) => { try{ localStorage.setItem('pp_cache_'+p, JSON.stringify(d)); }catch{} };
const cacheGet = p => { try{ const v=localStorage.getItem('pp_cache_'+p); return v?JSON.parse(v):null; }catch{ return null; } };

async function api(path, opts={}){
  const headers = {'Content-Type':'application/json', ...(opts.headers||{})};
  if(TOKEN) headers.Authorization = 'Bearer '+TOKEN;
  let r;
  try {
    r = await fetch(API+'/api'+path, {...opts, headers});
  } catch(e){                       // network/server unreachable
    goOffline();
    if(isGet(opts)){ const c = cacheGet(path); if(c !== null) return c; }
    throw new OfflineError('offline');
  }
  if(!ONLINE) goOnline();           // a successful request means we're back
  if(r.status===401){ logout(true); throw new Error('Please log in'); }
  if(!r.ok) throw new Error((await r.json().catch(()=>({}))).error||r.statusText);
  const data = r.status===204 ? null : await r.json();
  if(isGet(opts)) cacheSet(path, data);
  return data;
}

let _pollIv = null;
function goOffline(){ if(ONLINE){ ONLINE=false; updateConn(); toast('📴 Offline — orders will be queued'); startPoll(); } }
function goOnline(){ if(!ONLINE){ ONLINE=true; updateConn(); stopPoll(); toast('🟢 Back online — syncing'); flushOutbox(); } }
function startPoll(){ if(_pollIv) return; _pollIv=setInterval(async()=>{ try{ const r=await fetch(API+'/api/health'); if(r.ok) goOnline(); }catch{} }, 5000); }
function stopPoll(){ if(_pollIv){ clearInterval(_pollIv); _pollIv=null; } }
function updateConn(){
  const el=document.getElementById('connpill'); if(!el) return;
  const n=OUTBOX.length;
  el.innerHTML = ONLINE ? (n?`🟢 Online · syncing ${n}`:'🟢 Online') : `📴 Offline${n?` · ${n} queued`:''}`;
  el.style.color = ONLINE ? 'var(--green)' : 'var(--amber)';
}
window.addEventListener('online',  ()=>goOnline());
window.addEventListener('offline', ()=>goOffline());

let _flushing=false;
async function flushOutbox(){
  if(_flushing || !ONLINE || !OUTBOX.length){ updateConn(); return; }
  _flushing=true;
  try{
    while(OUTBOX.length){
      const op=OUTBOX[0];
      if(op.type==='order'){
        const order=await api('/orders',{method:'POST',body:JSON.stringify(op.payload)});
        await api('/orders/'+order.id+'/fire',{method:'POST'});
        PENDING=PENDING.filter(p=>p.tempId!==op.tempId); savePending();
      } else if(op.type==='payment'){
        // offline payments are cash/wallet only; record directly (no card auth needed)
        await api('/payments/complete',{method:'POST',body:JSON.stringify({
          intentId:'offline_'+(op.tempId||Date.now()), method:op.payload.method,
          lines:op.payload.lines, tip:op.payload.tip, table:op.payload.table, orderId:op.payload.orderId||null })});
      }
      OUTBOX.shift(); saveOutbox();
    }
    toast('✅ Synced all queued items');
    if(['kds','floor','dash'].includes(route)) render();
  } catch(e){
    // a failure (still offline, or a real error) — keep remaining items, retry later
  } finally { _flushing=false; updateConn(); }
}

let CFG = {paymentMode:'mock', taxRate:0.0825, publishableKey:null};
let MENU = [], CATS = [], activeCat = '', check = [], tableNo = null, route='pos';
let checkCustomer = null;   // loyalty member attached to the current check
let LOYALTY = { earnRate: 1, redeemRate: 0.05 };
let TENANT_MODE = 'restaurant';   // 'restaurant' | 'retail'
let TENANT_SETTINGS = {};         // { serviceChargePct, autoGratPct, autoGratParty }
const isRetail = () => TENANT_MODE === 'retail';
let posSearch = '';   // retail product search / scan filter
// Dayparting: is an item available right now per its schedule {days,start,end}?
function availableNow(it, now){ now=now||new Date(); const s=it&&it.schedule;
  if(!s||(!s.start&&!s.end&&(!Array.isArray(s.days)||!s.days.length))) return true;
  if(Array.isArray(s.days)&&s.days.length&&!s.days.includes(now.getDay())) return false;
  if(s.start||s.end){ const mins=now.getHours()*60+now.getMinutes();
    const toM=t=>{const p=String(t).split(':');return (Number(p[0])||0)*60+(Number(p[1])||0);};
    const a=s.start?toM(s.start):0,b=s.end?toM(s.end):1440;
    if(a<=b){ if(mins<a||mins>=b) return false; } else if(mins<a&&mins>=b) return false; }
  return true; }
const MODIFIERS = ["No onions","Extra cheese (+$1.50)","Add bacon (+$2)","Gluten-free (+$2)","Spicy","Well done","On the side"];

const NAV=[{id:"pos",ic:"🧾",label:"Order"},{id:"floor",ic:"🍽️",label:"Tables"},{id:"reservations",ic:"📅",label:"Reservations"},{id:"kds",ic:"👨‍🍳",label:"Kitchen"},
  {id:"online",ic:"📲",label:"Online"},{id:"qr",ic:"🔳",label:"QR Order"},{id:"dash",ic:"📊",label:"Reports"},{id:"analytics",ic:"📈",label:"Analytics"},{id:"menu",ic:"📖",label:"Menu"},{id:"inventory",ic:"📦",label:"Inventory"},{id:"purchasing",ic:"🚚",label:"Purchasing"},{id:"stocktake",ic:"🔢",label:"Stocktake"},{id:"loyalty",ic:"💳",label:"Loyalty"},{id:"crm",ic:"👥",label:"Customers"},{id:"marketing",ic:"📣",label:"Marketing"},{id:"drawer",ic:"💵",label:"Cash Drawer"},{id:"clock",ic:"⏱️",label:"Time Clock"},{id:"ask",ic:"✨",label:"Ask Tavo"},{id:"team",ic:"🧑‍🤝‍🧑",label:"Team"},{id:"settings",ic:"⚙️",label:"Setup"}];
const titles={pos:["Order","Build a check"],floor:["Tables","Floor plan"],reservations:["Reservations","Bookings & waitlist"],kds:["Kitchen Display","Live tickets"],
  online:["Online Orders","DoorDash · Uber Eats · Grubhub"],qr:["QR Order & Pay","Scan-to-order codes"],dash:["Reports","Performance"],analytics:["Analytics","Breakdowns & trends"],menu:["Menu Management","Items & pricing"],inventory:["Inventory","Stock & recipe costing"],purchasing:["Purchasing","Vendors & purchase orders"],stocktake:["Stocktake","Cycle counts & adjustments"],loyalty:["Loyalty & Gift Cards","Members & rewards"],crm:["Customers","Profiles & history"],marketing:["Marketing","Email & SMS campaigns"],drawer:["Cash Drawer","Open, reconcile & close"],clock:["Time Clock","Clock in & out"],ask:["Ask Tavo","Your AI business assistant"],team:["Team","Staff"],settings:["Setup","Settings"]};
const PLATFORM_META={doordash:{name:'DoorDash',color:'#ff3008',emoji:'🚗'},ubereats:{name:'Uber Eats',color:'#06c167',emoji:'🛵'},grubhub:{name:'Grubhub',color:'#f63440',emoji:'🍔'},other:{name:'Online',color:'#4d8df5',emoji:'📲'},qr:{name:'Table QR',color:'#a855f7',emoji:'📱'}};
function chMeta(o){ return o.channel==='delivery'?(PLATFORM_META[o.platform]||PLATFORM_META.other):(o.channel==='qr'?PLATFORM_META.qr:null); }

function toast(m){const t=$("#toastEl");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2400)}
function openModal(h){$("#modal").innerHTML=h;$("#overlay").classList.add("show")}
function closeModal(){$("#overlay").classList.remove("show")}
$("#overlay").addEventListener("click",e=>{if(e.target.id==="overlay")closeModal()});

function totals(lines){let sub=0,taxFull=0;const dft=CFG.taxRate||0;
  for(const l of lines){const m=(l.mods||[]).reduce((s,x)=>{const z=String(x).match(/\+\$([0-9.]+)/);return s+(z?+z[1]:0)},0);
    const ls=(l.price+m)*l.qty; sub+=ls; const r=(l.taxRate!=null&&l.taxRate!=='')?Number(l.taxRate):dft; taxFull+=ls*r;}
  const effRate=sub>0?taxFull/sub:dft; return{sub,tax:taxFull,total:sub+taxFull,effRate}}

function allowedNav(){
  const r = (ME&&ME.routes)||[];
  let nav = NAV.filter(n=>r.includes(n.id));
  if(isRetail()){
    // Retail businesses don't need tables, kitchen, QR table-ordering, or delivery.
    const hide=new Set(['floor','kds','qr','online','reservations']);
    nav = nav.filter(n=>!hide.has(n.id)).map(n=>{
      if(n.id==='pos') return {...n,ic:'🛒',label:'Sell'};
      if(n.id==='menu') return {...n,ic:'🏷️',label:'Products'};
      if(n.id==='inventory') return {...n,label:'Stock'};
      return n;
    });
  }
  return nav;
}
function renderNav(){
  $("#nav").innerHTML = allowedNav().map(n=>`<button class="navbtn ${route===n.id?'active':''}" onclick="go('${n.id}')"><span class="ic">${n.ic}</span>${n.label}</button>`).join("")
    + `<button class="navbtn" style="margin-top:auto" onclick="logout()"><span class="ic">⎋</span>Logout</button>`;
}

function posView(){
  const searching = posSearch.trim().length>0;
  const q = posSearch.trim().toLowerCase();
  const match = i => i.active!==false && availableNow(i) && (i.name.toLowerCase().includes(q) || (i.sku&&String(i.sku).toLowerCase().includes(q)) || (i.barcode&&String(i.barcode).toLowerCase().includes(q)));
  const list = searching ? MENU.filter(match) : MENU.filter(i=>i.category===activeCat && i.active!==false && availableNow(i));
  const cats = searching ? '' : CATS.map(c=>`<button class="cat ${c===activeCat?'active':''}" onclick="setCat('${c}')">${c}</button>`).join("");
  const badge = it => {
    if(!it.trackStock) return '';
    const s=Number(it.stock)||0;
    const col = s<=0?'var(--red)':(s<=5?'var(--amber)':'var(--mut)');
    return `<div class="pr" style="color:${col};font-size:11px">${s<=0?'Out of stock':(s+' in stock')}</div>`;
  };
  const items = list.map(it=>`<button class="item" ${it.trackStock&&Number(it.stock)<=0?'disabled style="opacity:.45"':''} onclick="addItem('${it.id}')"
    ${it.image?`style="background-image:linear-gradient(rgba(15,17,21,.45),rgba(15,17,21,.85)),url('${it.image}');background-size:cover;background-position:center"`:''}>
    ${it.image?'':`<div class="emoji">${it.emoji}</div>`}<div><div class="nm">${it.name}</div><div class="pr">${money(it.price)}</div>${badge(it)}${it.sku?`<div class="pr" style="font-size:10px;color:var(--mut)">${it.sku}</div>`:''}</div></button>`).join("")
    || `<div class="empty">No ${isRetail()?'products':'items'} ${searching?('match "'+esc(posSearch)+'"'):('in '+activeCat)}.</div>`;
  const scan = `<div style="padding:0 0 10px"><input id="posScan" placeholder="${isRetail()?'🔍 Scan barcode or search products…':'🔍 Search menu…'}"
      value="${esc(posSearch)}" oninput="setSearch(this.value)" onkeydown="if(event.key==='Enter')scanAdd()"
      style="width:100%;padding:12px 14px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-size:15px"></div>`;
  return `<div class="pos"><div class="menuwrap">${scan}${cats?`<div class="cats">${cats}</div>`:''}<div class="items">${items}</div></div>${checkPanel()}</div>`;

/* ---- grouped modifier picker (Toast/Square-style: required/optional, min/max, pricing) ---- */
let _mp=null;
function openModifierPicker(it,lineIndex){
  const sel={}; (it.modifierGroups||[]).forEach(g=>sel[g.id]=new Set());
  if(lineIndex!=null && check[lineIndex]){
    const have=(check[lineIndex].mods||[]).map(m=>m.replace(/\s*\(\+\$[0-9.]+\)$/,''));
    (it.modifierGroups||[]).forEach(g=>g.options.forEach(o=>{ if(have.includes(o.name)) sel[g.id].add(o.name); }));
  }
  _mp={it,lineIndex,sel}; renderModifierPicker();
}
function toggleOpt(gid,name){
  const g=_mp.it.modifierGroups.find(x=>x.id===gid); const s=_mp.sel[gid]; const single=(g.max||0)===1;
  if(single){ s.clear(); s.add(name); }
  else if(s.has(name)) s.delete(name);
  else { if(g.max && s.size>=g.max){ toast('Up to '+g.max+' for '+g.name); return; } s.add(name); }
  renderModifierPicker();
}
function _mpExtra(){ let e=0; _mp.it.modifierGroups.forEach(g=>g.options.forEach(o=>{ if(_mp.sel[g.id].has(o.name)) e+=o.price||0; })); return e; }
function renderModifierPicker(){
  const it=_mp.it;
  const groups=it.modifierGroups.map(g=>{const s=_mp.sel[g.id];
    const tag=g.required?'<span class="tag red" style="font-size:10px">Required</span>'
      :`<span class="tag" style="font-size:10px;background:var(--panel2);color:var(--mut)">Optional${g.max?` · up to ${g.max}`:''}</span>`;
    const opts=g.options.map(o=>`<button class="chip ${s.has(o.name)?'sel':''}" onclick="toggleOpt('${g.id}','${(o.name||'').replace(/'/g,"\\'")}')">${o.name}${o.price?` +$${(o.price).toFixed(2)}`:''}</button>`).join('');
    return `<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><b style="font-size:13px">${g.name}</b>${tag}</div><div class="modrow" style="margin:0">${opts}</div></div>`;
  }).join('');
  openModal(`<div class="mhd"><h3>${it.emoji||''} ${it.name}</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="mbd">${groups}<button class="btn primary" onclick="commitMods()">${_mp.lineIndex!=null?'Update':'Add'} · ${money(it.price+_mpExtra())}</button></div>`);
}
function commitMods(){
  for(const g of _mp.it.modifierGroups){ const n=_mp.sel[g.id].size;
    if(g.required && n<(g.min||1)){ toast('Choose '+(g.min||1)+' for '+g.name); return; }
    if(g.min && n<g.min){ toast('Choose at least '+g.min+' for '+g.name); return; } }
  const mods=[]; _mp.it.modifierGroups.forEach(g=>g.options.forEach(o=>{ if(_mp.sel[g.id].has(o.name)) mods.push(o.price?`${o.name} (+$${o.price.toFixed(2)})`:o.name); }));
  if(_mp.lineIndex!=null && check[_mp.lineIndex]) check[_mp.lineIndex].mods=mods;
  else check.push({id:_mp.it.id,name:_mp.it.name,price:_mp.it.price,qty:1,mods,taxRate:_mp.it.taxRate??null});
  _mp=null; closeModal(); render();
}

// Full settlement math (mirrors the server): discount reduces taxable subtotal,
// service charge adds, tax on discounted subtotal, tip last; gift card is a tender.
function payCalc(){
  const sub=pay.sub;
  const disc=Math.round(Math.min(sub,(pay.redeemDiscount||0)+(pay.manualDiscount||0))*100)/100;
  const taxable=Math.round((sub-disc)*100)/100;
  const svc=Math.round((pay.serviceCharge||0)*100)/100;
  const tax=pay.taxExempt?0:Math.round(taxable*(pay.effRate!=null?pay.effRate:(CFG.taxRate||0))*100)/100;
  const tip=Math.round((pay.tip||0)*100)/100;
  const total=Math.round((taxable+svc+tax+tip)*100)/100;
  const gift=Math.min(pay.giftApplied||0,total);
  const due=Math.round(Math.max(0,total-gift)*100)/100;
  return {sub,disc,svc,tax,tip,total,gift,due};
}

      </div>

    ${pay.manualDiscount>0
      ? `<div style="display:flex;gap:6px;align-items:center"><span class="tag amber">${pay.comp?'Comp':'Discount'} −${money(pay.manualDiscount)}${pay.discountReason?(' · '+esc(pay.discountReason)):''}</span><button class="chip" style="margin-left:auto" onclick="clearDiscount()">Remove</button></div>`
      : `<div style="display:flex;gap:6px"><button class="chip" onclick="openDiscount()">＋ Add discount</button>${isMgr?'<button class="chip" style="color:var(--amber)" onclick="compCheck()">Comp check (100%)</button>':''}</div>`}</div>`;
  // service charge

    <div style="display:flex;gap:6px;flex-wrap:wrap">

function applyDiscount(){

  let d=amt>0?amt:(pct>0?Math.round(pay.sub*pct)/100:0);

  if(!(d>0)){ toast('Enter a percent or amount'); return; }
  pay.manualDiscount=d; pay.discountReason=($("#d-reason").value||'').trim()||(pct?(pct+'% off'):'Discount'); pay.comp=false;

}

async function applyGift(){

}
function removeGift(){ pay.giftApplied=0; pay.giftCode=null; paymentModal(); }
function setTip(p){pay.tipPct=p;pay.tip=+(pay.sub*p/100).toFixed(2);paymentModal()}
function setCustomTip(v){pay.tip=parseFloat(v)||0;pay.tipPct=null;const c=payCalc();$(".mhd h3").textContent='Payment · '+money(c.due);const b=document.querySelector('.btn.green');if(b)b.textContent=c.due>0?('Charge '+money(c.due)):'Complete (paid)';}
function setMethod(m){pay.method=m;paymentModal()}

/* ---- split payment (even split or multiple tenders) ---- */
let _split=null;
function evenTenders(total,n){
  const each=Math.floor(total/n*100)/100; const t=[];
  for(let i=0;i<n;i++) t.push({method:'card',amount:i===n-1?Math.round((total-each*(n-1))*100)/100:each});
  return t;
}
function openSplit(){
  const total=payCalc().total;
  if(!(total>0)){ toast('Nothing to split'); return; }
  _split={total,tenders:evenTenders(total,2)};
  splitModal();
}
function splitTotal(){ return Math.round(_split.tenders.reduce((a,t)=>a+(Number(t.amount)||0),0)*100)/100; }
function splitModal(){
  const paid=splitTotal(); const remain=Math.round((_split.total-paid)*100)/100;
  const ways=[2,3,4,5,6].map(n=>`<button class="chip ${_split.tenders.length===n?'sel':''}" onclick="setSplitWays(${n})">${n}</button>`).join('');
  const rows=_split.tenders.map((t,i)=>`<div style="display:flex;gap:6px;margin:6px 0;align-items:center">
      <span style="width:22px;color:var(--mut)">${i+1}</span>
      <select onchange="setTenderMethod(${i},this.value)" style="padding:8px;border-radius:8px;background:var(--panel);border:1px solid var(--line);color:var(--txt)">
        ${['card','cash','wallet'].map(m=>`<option value="${m}" ${t.method===m?'selected':''}>${m}</option>`).join('')}</select>
      <input type="number" step="0.01" value="${t.amount}" oninput="setTenderAmt(${i},this.value)" style="flex:1;padding:8px;border-radius:8px;background:var(--panel);border:1px solid var(--line);color:var(--txt)">
      ${_split.tenders.length>1?`<button class="chip" style="color:var(--red)" onclick="rmTender(${i})">✕</button>`:''}</div>`).join('');
  openModal(`<div class="mhd"><h3>Split ${money(_split.total)}</h3><button class="x" onclick="paymentModal()">✕</button></div><div class="mbd">
    <div class="sec-title">Split evenly</div><div style="display:flex;gap:6px;margin-bottom:10px">${ways}<button class="chip" onclick="addTender()">＋ tender</button></div>
    <div class="sec-title">Tenders</div>${rows}
    <div class="totals" style="border-top:none;padding:0;margin-top:8px">
      <div class="totrow"><span>Allocated</span><span>${money(paid)}</span></div>
      <div class="totrow big" style="color:${Math.abs(remain)<0.005?'var(--green)':'var(--amber)'}"><span>${remain>=0?'Remaining':'Over by'}</span><span>${money(Math.abs(remain))}</span></div></div>
    <button class="btn green" style="margin-top:10px" ${Math.abs(remain)>=0.005?'disabled style="opacity:.5"':''} onclick="submitSplit()">Charge ${_split.tenders.length} tenders</button></div>`);
}
function setSplitWays(n){ _split.tenders=evenTenders(_split.total,n); splitModal(); }
function setTenderMethod(i,m){ _split.tenders[i].method=m; }
function setTenderAmt(i,v){ _split.tenders[i].amount=Math.max(0,parseFloat(v)||0); const paid=splitTotal();const remain=Math.round((_split.total-paid)*100)/100;const b=document.querySelector('.btn.green');if(b){b.disabled=Math.abs(remain)>=0.005;b.style.opacity=b.disabled?.5:1;} }
function addTender(){ _split.tenders.push({method:'cash',amount:Math.max(0,Math.round((_split.total-splitTotal())*100)/100)}); splitModal(); }
function rmTender(i){ _split.tenders.splice(i,1); splitModal(); }
async function submitSplit(){
  const trueDisc=Math.round(((pay.redeemDiscount||0)+(pay.manualDiscount||0))*100)/100;
  try{
    const r=await api('/payments/split',{method:'POST',body:JSON.stringify({
      lines:pay.lines.map(l=>({name:l.name,price:l.price,qty:l.qty,mods:l.mods})),
      tip:pay.tip, discount:trueDisc, discountReason:pay.discountReason||null, comp:!!pay.comp, serviceCharge:pay.serviceCharge||0, taxExempt:!!pay.taxExempt,
      orderId:pay.orderId||null, table:pay.table,
      tenders:_split.tenders.map(t=>({method:t.method,amount:t.amount})),
      customerId:pay.customer?pay.customer.id:null, pointsRedeemed:pay.pointsRedeemed||0})});
    try{ await loadMenu(); }catch(e){}
    check=[];tableNo=null;checkCustomer=null;_split=null;
    showReceipt(r.total);renderNav();
    toast('✅ Split across '+r.tenders+' tenders · '+money(r.total));
  }catch(e){ toast('⚠️ '+e.message); }
}

async function processPayment(){
  const grand=payCalc().due;
  // Offline: card needs a connection; cash/wallet can be queued.
  if(!ONLINE){
    if(pay.method==='card'){ toast('💳 Card needs a connection — take cash or wait to reconnect'); return; }
    return queuePayment(grand);
  }
  try{
    const intent=await api('/payments/intent',{method:'POST',body:JSON.stringify({lines:pay.lines.map(l=>({name:l.name,price:l.price,qty:l.qty,mods:l.mods})),tip:pay.tip,table:pay.table})});
    if(pay.method==='card' && intent.mode==='stripe' && CFG.publishableKey){
      return stripeCardFlow(intent);   // real Stripe Payment Element
    }
    // mock / cash / wallet: show animated auth then complete
    openModal(`<div class="mbd c" style="text-align:center;padding:50px 30px"><div style="font-size:46px">${pay.method==='cash'?'💵':'💳'}</div>
      <h3 style="margin:14px 0 6px">${pay.method==='cash'?'Cash tendered…':'Authorizing…'}</h3>
      <p style="color:var(--mut)">${money(grand)} · ${intent.mode==='mock'?'mock processor':'stripe'}</p>
      <div class="bar"><i style="width:0%" id="ab"></i></div></div>`);
    let w=0;const iv=setInterval(async()=>{w+=25;$("#ab").style.width=w+"%";if(w>=100){clearInterval(iv);await completePayment(intent.id,grand)}},220);
  }catch(e){
    if(e.offline){
      if(pay.method==='card'){ toast('💳 Connection lost — card not charged'); return; }
      return queuePayment(grand);    // cash/wallet: queue instead of failing
    }
    toast('⚠️ '+e.message);
  }
}
function queuePayment(grand){
  const tempId='pay_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  OUTBOX.push({type:'payment',tempId,payload:{
    method:pay.method, tip:pay.tip, table:pay.table, orderId:pay.orderId||null,
    discount:Math.round(((pay.redeemDiscount||0)+(pay.manualDiscount||0))*100)/100, discountReason:pay.discountReason||null, comp:!!pay.comp, serviceCharge:pay.serviceCharge||0,
    lines:pay.lines.map(l=>({name:l.name,price:l.price,qty:l.qty,mods:l.mods}))}});
  saveOutbox();
  if(pay.table){ PENDING=PENDING.filter(p=>p.table!==pay.table); savePending(); }  // table settled locally
  check=[];tableNo=null;checkCustomer=null;showReceipt(grand);renderNav();
  toast('📴 '+pay.method+' payment queued — will sync when online');
}
async function stripeCardFlow(intent){
  const grand=intent.amount;
  openModal(`<div class="mhd"><h3>Card · ${money(grand)}</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="mbd"><p style="color:var(--mut);font-size:13px;margin-top:0">Test card: 4242 4242 4242 4242 · any future date · any CVC</p>
    <div id="stripe-element"></div><div id="stripe-err" style="color:var(--red);font-size:13px;min-height:18px"></div>
    <button class="btn green" id="paybtn" onclick="confirmStripe('${intent.id}',${grand})">Pay ${money(grand)}</button></div>`);
  const stripe=Stripe(CFG.publishableKey);
  window._stripe=stripe;
  const elements=stripe.elements({clientSecret:intent.clientSecret,appearance:{theme:'night'}});
  window._elements=elements;
  const pe=elements.create('payment');pe.mount('#stripe-element');
}
async function confirmStripe(intentId,grand){
  $("#paybtn").disabled=true;$("#paybtn").textContent='Processing…';
  const {error}=await window._stripe.confirmPayment({elements:window._elements,redirect:'if_required'});
  if(error){$("#stripe-err").textContent=error.message;$("#paybtn").disabled=false;$("#paybtn").textContent='Pay '+money(grand);return}
  await completePayment(intentId,grand);
}
async function completePayment(intentId,grand){
  try{
    // Redeem the gift card balance (server-side) for the applied amount.
    if(pay.giftCode && pay.giftApplied>0){
      try{ await api('/giftcards/'+encodeURIComponent(pay.giftCode)+'/redeem',{method:'POST',body:JSON.stringify({amount:pay.giftApplied})}); }
      catch(e){ /* non-fatal: card may have changed */ }
    }
    const trueDisc=Math.round(((pay.redeemDiscount||0)+(pay.manualDiscount||0))*100)/100;
    const r=await api('/payments/complete',{method:'POST',body:JSON.stringify({
      intentId, method:pay.giftApplied>0&&grand<=0?'giftcard':pay.method,
      lines:pay.lines.map(l=>({name:l.name,price:l.price,qty:l.qty,mods:l.mods})),
      tip:pay.tip, table:pay.table, discount:trueDisc, discountReason:pay.discountReason||null, comp:!!pay.comp, serviceCharge:pay.serviceCharge||0, taxExempt:!!pay.taxExempt,
      customerId: pay.customer?pay.customer.id:null, pointsRedeemed: pay.pointsRedeemed||0})});
    if(pay.customer && r && r.pointsBalance!=null) toast('💳 '+(r.pointsEarned||0)+' pts earned · balance '+r.pointsBalance);
    _lastPayId=(r&&r.id)||null;
    _lastPayCustomer=pay.customer?{email:pay.customer.email||'',phone:pay.customer.phone||''}:null;
    try{ await loadMenu(); }catch(e){}   // refresh retail stock counts after a sale
    check=[];tableNo=null;checkCustomer=null;showReceipt(grand);renderNav();
  }catch(e){toast('⚠️ '+e.message)}
}

let _qrLibLoading=null;
function loadQRLib(){
  if(window.QRCode) return Promise.resolve();
  if(_qrLibLoading) return _qrLibLoading;
  _qrLibLoading=new Promise((res,rej)=>{const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  return _qrLibLoading;
}
async function paintQRs(){
  try{ await loadQRLib(); }catch(e){ toast('⚠️ Could not load QR generator (needs internet)'); return; }
  document.querySelectorAll('.qrbox').forEach(box=>{
    if(box._done) return; box._done=true;
    new QRCode(box,{text:box.dataset.url,width:140,height:140,correctLevel:QRCode.CorrectLevel.M});
  });
}
function copyLink(url){ navigator.clipboard?.writeText(url).then(()=>toast('🔗 Link copied'),()=>toast(url)); }
function qrImgData(url){ // build a standalone QR as data-url for printing
  const tmp=document.createElement('div'); new QRCode(tmp,{text:url,width:240,height:240,correctLevel:QRCode.CorrectLevel.M});
  const img=tmp.querySelector('img'), cnv=tmp.querySelector('canvas');
  return (img&&img.src)||(cnv&&cnv.toDataURL('image/png'))||'';
}

// Print a sheet of barcode/price labels for products that have a SKU or barcode.
function printLabels(){
  const items=_menuItems.filter(i=>i.barcode||i.sku);
  if(!items.length){ toast('No products with a SKU or barcode'); return; }
  const code=s=>{ // simple CSS barcode: alternating bars from the digits
    const digits=String(s).replace(/\D/g,'')||'00000000';
    return digits.split('').map(d=>`<span style="display:inline-block;width:${1+(+d)%3}px;height:34px;background:#000;margin-right:1px"></span>`).join('');
  };
  const cells=items.map(it=>`<div style="border:1px solid #bbb;border-radius:4px;padding:8px;width:200px;display:inline-block;margin:4px;text-align:center;vertical-align:top">
      <div style="font-weight:700;font-size:13px;margin-bottom:2px">${esc(it.name)}</div>
      <div style="font-size:18px;font-weight:800;margin-bottom:4px">${money(it.price)}${it.weighted?(' /'+(it.weightUnit||'lb')):''}</div>
      ${it.barcode?`<div style="line-height:0;margin:4px 0">${code(it.barcode)}</div><div style="font-size:10px;font-family:monospace">${esc(it.barcode)}</div>`:''}
      ${it.sku?`<div style="font-size:10px;color:#444;margin-top:2px">SKU: ${esc(it.sku)}</div>`:''}
    </div>`).join('');
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>Labels</title></head><body style="font-family:system-ui,sans-serif;margin:8px">${cells}<scr`+`ipt>window.onload=function(){window.print()}</scr`+`ipt></body></html>`);
  w.document.close();
}

async function delInv(id){

  catch(e){ toast(e.offline?'📴 Needs a connection':'⚠️ '+e.message); }
}

/* ---- RESERVATIONS + WAITLIST ---- */
let _resvs=[], _resvTab='reservations';
async function reservationsView(){
  _resvs=await api('/reservations').catch(()=>[]);
  const resvs=_resvs.filter(r=>r.kind==='reservation');
  const waits=_resvs.filter(r=>r.kind==='waitlist');
  const activeWait=waits.filter(w=>w.status==='waiting');
  const upcoming=resvs.filter(r=>r.status==='booked');
  const tab=(id,label,n)=>`<button class="chip ${_resvTab===id?'sel':''}" style="padding:8px 16px" onclick="_resvTab='${id}';render()">${label}${n?` <b>${n}</b>`:''}</button>`;
  const statusTag={booked:'<span class="tag" style="background:#1e3a5f;color:#7fb3ff">Booked</span>',waiting:'<span class="tag" style="background:#3b3320;color:#f5c451">Waiting</span>',seated:'<span class="tag green">Seated</span>',cancelled:'<span class="tag red">Cancelled</span>',noshow:'<span class="tag red">No-show</span>',done:'<span class="tag">Done</span>'};
  let body;
  if(_resvTab==='reservations'){
    const rows=resvs.map(r=>`<tr style="${['cancelled','noshow','done'].includes(r.status)?'opacity:.5':''}">
        <td style="white-space:nowrap"><b>${new Date(r.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</b><div style="font-size:11px;color:var(--mut)">${new Date(r.time).toLocaleDateString()}</div></td>
        <td><b>${esc(r.name)}</b>${r.notes?`<div style="font-size:11px;color:var(--mut)">${esc(r.notes)}</div>`:''}</td>
        <td style="text-align:center">👥 ${r.partySize}</td>
        <td style="color:var(--mut)">${esc(r.phone||'')}</td>
        <td>${statusTag[r.status]||r.status}${r.tableNumber?` · T${r.tableNumber}`:''}</td>
        <td style="text-align:right;white-space:nowrap">${r.status==='booked'?`<button class="btn green" style="flex:0;padding:6px 10px" onclick="seatResv('${r.id}')">Seat</button>
          <button class="chip" onclick="resvStatus('${r.id}','noshow')">No-show</button>
          <button class="chip" onclick="resvStatus('${r.id}','cancelled')">✕</button>`:''}</td></tr>`).join('')
      ||'<tr><td colspan="6" style="text-align:center;color:var(--mut);padding:20px">No reservations. Add one above.</td></tr>';
    body=`<div class="card"><table><thead><tr><th>Time</th><th>Guest</th><th>Party</th><th>Phone</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  } else {
    const rows=waits.map(w=>{const elapsed=Math.floor((Date.now()-w.createdAt)/60000);
      return `<tr style="${['cancelled','noshow','done','seated'].includes(w.status)?'opacity:.5':''}">
        <td><b>${esc(w.name)}</b>${w.notes?`<div style="font-size:11px;color:var(--mut)">${esc(w.notes)}</div>`:''}</td>
        <td style="text-align:center">👥 ${w.partySize}</td>
        <td style="text-align:center">${w.quotedWait!=null?w.quotedWait+'m quoted':''}</td>
        <td style="text-align:center;color:${elapsed>(w.quotedWait||999)?'#f87171':'var(--mut)'}">waiting ${elapsed}m</td>
        <td>${statusTag[w.status]||w.status}${w.tableNumber?` · T${w.tableNumber}`:''}</td>
        <td style="text-align:right;white-space:nowrap">${w.status==='waiting'?`<button class="btn green" style="flex:0;padding:6px 10px" onclick="seatResv('${w.id}')">Seat</button>
          <button class="chip" onclick="resvStatus('${w.id}','cancelled')">✕</button>`:''}</td></tr>`;}).join('')
      ||'<tr><td colspan="6" style="text-align:center;color:var(--mut);padding:20px">Waitlist is empty.</td></tr>';
    body=`<div class="card"><table><thead><tr><th>Guest</th><th>Party</th><th>Quote</th><th>Waiting</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }
  return `<div style="display:flex;gap:10px;margin-bottom:16px">
      <div class="card" style="flex:1;text-align:center"><div style="font-size:24px;font-weight:800">${upcoming.length}</div><div style="color:var(--mut);font-size:12px">Upcoming bookings</div></div>
      <div class="card" style="flex:1;text-align:center"><div style="font-size:24px;font-weight:800;color:#f5c451">${activeWait.length}</div><div style="color:var(--mut);font-size:12px">On waitlist</div></div>
      <div class="card" style="flex:1;text-align:center"><div style="font-size:24px;font-weight:800;color:#34d399">${_resvs.filter(r=>r.status==='seated').length}</div><div style="color:var(--mut);font-size:12px">Seated today</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:6px">${tab('reservations','📅 Reservations',upcoming.length)}${tab('waitlist','⏳ Waitlist',activeWait.length)}</div>
      <button class="btn primary" style="flex:0;padding:10px 18px" onclick="resvForm('${_resvTab==='waitlist'?'waitlist':'reservation'}')">+ ${_resvTab==='waitlist'?'Add to waitlist':'New reservation'}</button></div>
    ${body}`;
}
function resvForm(kind){
  const ip='width:100%;padding:9px;border-radius:8px;background:var(--panel);border:1px solid var(--line);color:var(--txt)';
  const isW=kind==='waitlist';
  const now=new Date(Date.now()+3600000); const dt=now.toISOString().slice(0,16);
  openModal(`<div class="mhd"><h3>${isW?'⏳ Add to Waitlist':'📅 New Reservation'}</h3><button class="x" onclick="closeModal()">✕</button></div><div class="mbd">
    <div class="fld"><label>Guest name</label><input id="rf-name" style="${ip}" autofocus></div>
    <div class="row2"><div class="fld" style="margin:0"><label>Party size</label><input id="rf-party" type="number" min="1" value="2" style="${ip}"></div>
      <div class="fld" style="margin:0"><label>Phone</label><input id="rf-phone" style="${ip}"></div></div>
    ${isW?`<div class="fld"><label>Quoted wait (minutes)</label><input id="rf-wait" type="number" min="0" value="20" style="${ip}"></div>`
        :`<div class="fld"><label>Date &amp; time</label><input id="rf-time" type="datetime-local" value="${dt}" style="${ip}"></div>`}
    <div class="fld"><label>Notes</label><input id="rf-notes" placeholder="seating preference, occasion…" style="${ip}"></div>
    <button class="btn green" style="margin-top:6px" onclick="saveResv('${kind}')">${isW?'Add to waitlist':'Book reservation'}</button></div>`);
}
async function saveResv(kind){
  const body={kind,name:$("#rf-name").value.trim(),partySize:$("#rf-party").value,phone:$("#rf-phone").value.trim(),notes:$("#rf-notes").value.trim()};
  if(!body.name){ toast('Guest name required'); return; }
  if(kind==='waitlist') body.quotedWait=$("#rf-wait").value;
  else { const t=$("#rf-time").value; if(!t){ toast('Pick a time'); return; } body.time=new Date(t).getTime(); }
  try{ await api('/reservations',{method:'POST',body:JSON.stringify(body)}); closeModal(); render(); toast(kind==='waitlist'?'⏳ Added to waitlist':'📅 Reservation booked'); }
  catch(e){ toast('⚠️ '+e.message); }
}
async function seatResv(id){
  const t=prompt('Seat at table number (optional):','');
  if(t===null) return;
  try{ await api('/reservations/'+id+'/seat',{method:'POST',body:JSON.stringify({tableNumber:t?Number(t):null})}); render(); toast('✓ Party seated'); }
  catch(e){ toast('⚠️ '+e.message); }
}
async function resvStatus(id,status){
  try{ await api('/reservations/'+id+'/status',{method:'POST',body:JSON.stringify({status})}); render(); toast('Updated'); }
  catch(e){ toast('⚠️ '+e.message); }
}

/* ---- ANALYTICS (advanced reporting) ---- */
let _anDays=30, _anData=null, _rbGroup='employee', _rbMetric='sales', _rbRows=null;
function anRange(){ const to=Date.now(); return {from:to-_anDays*86400000,to}; }
async function analyticsView(){
  const {from,to}=anRange();
  _anData=await api('/reports/analytics?from='+from+'&to='+to).catch(()=>null);
  if(!_anData) return '<div class="empty">Analytics need a connection to your sales data.</div>';
  const d=_anData, t=d.totals, c=d.compare;
  const arrow=p=>p>0?`<span style="color:#34d399">▲ ${p}%</span>`:(p<0?`<span style="color:#f87171">▼ ${Math.abs(p)}%</span>`:'<span style="color:var(--mut)">—</span>');
  const ranges=[['Today',1],['7 days',7],['30 days',30],['90 days',90]];
  const rangeBtns=ranges.map(([l,n])=>`<button class="chip ${_anDays===n?'sel':''}" onclick="_anDays=${n};render()">${l}</button>`).join('');
  // hourly heatmap
  const maxHr=Math.max(1,...d.byHour.map(h=>h.sales));
  const heat=d.byHour.map(h=>{const i=h.sales/maxHr;const bg=h.sales>0?`rgba(99,102,241,${0.15+i*0.85})`:'var(--panel2)';
    return `<div title="${h.hour}:00 — ${money(h.sales)} · ${h.orders} orders" style="flex:1;min-width:0">
      <div style="height:${8+Math.round(i*46)}px;background:${bg};border-radius:3px"></div>
      <div style="font-size:8px;color:var(--mut);text-align:center;margin-top:2px">${h.hour%3===0?h.hour:''}</div></div>`;}).join('');
  const tbl=(title,rows,fmt)=>`<div class="card" style="flex:1;min-width:230px"><div class="sec-title" style="margin:0 0 8px">${title}</div>
    <table>${rows.length?rows.map(fmt).join(''):'<tr><td style="color:var(--mut);padding:8px">No data in range.</td></tr>'}</table></div>`;
  const barRow=(label,val,max,extra)=>{const w=max>0?Math.round((val/max)*100):0;
    return `<tr><td style="padding:4px 0"><div style="font-size:12px;margin-bottom:2px;display:flex;justify-content:space-between"><span>${esc(label)}</span><span style="font-weight:600">${extra||money(val)}</span></div>
      <div style="height:6px;background:var(--panel);border-radius:4px;overflow:hidden"><div style="width:${w}%;height:100%;background:linear-gradient(90deg,#6366f1,#a855f7)"></div></div></td></tr>`;};
  const empMax=Math.max(1,...d.byEmployee.map(e=>e.sales));
  const catMax=Math.max(1,...d.byCategory.map(e=>e.sales));
  const dpMax=Math.max(1,...d.byDaypart.map(e=>e.sales));
  const dowMax=Math.max(1,...d.byDow.map(e=>e.sales));
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:6px">${rangeBtns}</div>
      <div style="font-size:12px;color:var(--mut)">${new Date(from).toLocaleDateString()} – ${new Date(to).toLocaleDateString()}</div></div>
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <div class="card" style="flex:1;min-width:150px"><div style="color:var(--mut);font-size:12px">Net sales</div><div style="font-size:24px;font-weight:800">${money(t.netSales)}</div><div style="font-size:12px">vs prev ${arrow(c.salesChangePct)}</div></div>
      <div class="card" style="flex:1;min-width:150px"><div style="color:var(--mut);font-size:12px">Orders</div><div style="font-size:24px;font-weight:800">${t.orders}</div><div style="font-size:12px">vs prev ${arrow(c.ordersChangePct)}</div></div>
      <div class="card" style="flex:1;min-width:150px"><div style="color:var(--mut);font-size:12px">Avg check</div><div style="font-size:24px;font-weight:800">${money(t.avgCheck)}</div></div>
      <div class="card" style="flex:1;min-width:150px"><div style="color:var(--mut);font-size:12px">Tax collected</div><div style="font-size:24px;font-weight:800">${money(t.tax)}</div><div style="font-size:12px;color:var(--mut)">${t.taxExemptOrders} exempt</div></div>
    </div>
    <div class="card" style="margin-bottom:16px"><div class="sec-title" style="margin:0 0 10px">⏰ Sales by hour</div>
      <div style="display:flex;gap:2px;align-items:flex-end">${heat}</div></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
      ${tbl('👤 By employee',d.byEmployee,e=>barRow(e.key,e.sales,empMax))}
      ${tbl('🍔 By category',d.byCategory,e=>barRow(e.key,e.sales,catMax,money(e.sales)+' · '+e.units+'u'))}
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
      ${tbl('🕐 By daypart',d.byDaypart,e=>barRow(e.key,e.sales,dpMax))}
      ${tbl('📅 By day of week',d.byDow,e=>barRow(e.key,e.sales,dowMax))}
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
      ${tbl('💳 By payment method',d.byMethod,e=>barRow(e.key,e.sales,Math.max(1,...d.byMethod.map(x=>x.sales))))}
      <div class="card" style="flex:1;min-width:230px"><div class="sec-title" style="margin:0 0 8px">🏷 Discounts — ${money(d.discounts.total)}</div>
        <table>${d.discounts.byReason.length?d.discounts.byReason.map(r=>`<tr><td>${esc(r.key)}</td><td style="text-align:right;color:var(--mut)">${r.count}×</td><td style="text-align:right;font-weight:600">${money(r.amount)}</td></tr>`).join(''):'<tr><td style="color:var(--mut);padding:8px">No discounts in range.</td></tr>'}</table></div>
    </div>
    <div class="card">
      <div class="sec-title" style="margin:0 0 10px">🔧 Custom report</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px">
        <div><label style="font-size:12px;color:var(--mut)">Group by</label><br>
          <select id="rb-group" style="padding:8px;border-radius:8px;background:var(--panel2);border:1px solid var(--line);color:var(--txt)">
            ${[['employee','Employee'],['category','Category'],['daypart','Daypart'],['hour','Hour'],['dow','Day of week'],['method','Payment method'],['day','Calendar day']].map(([v,l])=>`<option value="${v}" ${_rbGroup===v?'selected':''}>${l}</option>`).join('')}</select></div>
        <div><label style="font-size:12px;color:var(--mut)">Measure</label><br>
          <select id="rb-metric" style="padding:8px;border-radius:8px;background:var(--panel2);border:1px solid var(--line);color:var(--txt)">
            ${[['sales','Net sales'],['orders','Orders'],['avg','Avg check'],['tips','Tips']].map(([v,l])=>`<option value="${v}" ${_rbMetric===v?'selected':''}>${l}</option>`).join('')}</select></div>
        <button class="btn primary" style="flex:0;padding:9px 18px" onclick="runReport()">Run</button>
        <button class="btn ghost" style="flex:0;padding:9px 14px" onclick="exportReport()">⬇ CSV</button>
      </div>
      <div id="rb-out">${_rbRows?reportTable():'<div style="color:var(--mut);font-size:13px">Pick a dimension and measure, then Run.</div>'}</div>
    </div>`;
}
function reportTable(){
  if(!_rbRows||!_rbRows.length) return '<div style="color:var(--mut);font-size:13px">No rows.</div>';
  const money$=_rbMetric==='orders'?(v=>v):(v=>money(v));
  const max=Math.max(1,..._rbRows.map(r=>r.value));
  return `<table>${_rbRows.map(r=>`<tr><td style="padding:5px 0">${esc(r.key)}</td>
    <td style="width:55%"><div style="height:8px;background:var(--panel);border-radius:4px;overflow:hidden"><div style="width:${Math.round(r.value/max*100)}%;height:100%;background:linear-gradient(90deg,#6366f1,#a855f7)"></div></div></td>
    <td style="text-align:right;font-weight:600;white-space:nowrap">${money$(r.value)}</td></tr>`).join('')}</table>`;
}
async function runReport(){
  _rbGroup=$("#rb-group").value; _rbMetric=$("#rb-metric").value;
  const {from,to}=anRange();
  try{ const r=await api(`/reports/build?groupBy=${_rbGroup}&metric=${_rbMetric}&from=${from}&to=${to}`); _rbRows=r.rows; document.getElementById('rb-out').innerHTML=reportTable(); }
  catch(e){ toast('⚠️ '+e.message); }
}
function exportReport(){
  if(!_rbRows||!_rbRows.length){ toast('Run a report first'); return; }
  const head=_rbGroup+','+_rbMetric+'\n';
  const body=_rbRows.map(r=>`"${String(r.key).replace(/"/g,'""')}",${r.value}`).join('\n');
  const blob=new Blob([head+body],{type:'text/csv'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='tavo-report-'+_rbGroup+'.csv'; a.click(); URL.revokeObjectURL(url);
  toast('⬇ CSV downloaded');
}

let _takes=[], _activeTake=null;
async function stocktakeView(){
  _takes=await api('/stocktakes').catch(()=>[]);
  if(_activeTake){
    const t=_activeTake;
    const rows=t.counts.map((c,i)=>{
      const counted=c.counted==null?'':c.counted;
      const v=c.counted==null?null:(Number(c.counted)-Number(c.expected));
      return `<tr><td><b>${esc(c.name)}</b>${c.sku?`<div style="font-size:11px;color:var(--mut)">${esc(c.sku)}</div>`:''}</td>
        <td style="text-align:right;color:var(--mut)">${c.expected}</td>

        <td id="stv-${i}" style="text-align:right;font-weight:600;color:${v==null?'var(--mut)':(v===0?'var(--mut)':(v<0?'#f87171':'#34d399'))}">${v==null?'—':(v>0?'+'+v:v)}</td></tr>`;
    }).join('');
    return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div><div class="sec-title" style="margin:0">${esc(t.name)}</div><div style="font-size:12px;color:var(--mut)">Enter your physical counts, then apply to update stock.</div></div>
        <div style="display:flex;gap:6px">
          <button class="btn ghost" style="flex:0;padding:9px 16px" onclick="saveTake()">Save</button>
          <button class="btn primary" style="flex:0;padding:9px 16px" onclick="applyTake()">Apply &amp; close</button>
          <button class="chip" onclick="_activeTake=null;render()">Back</button></div></div>
      <div class="card"><table>
        <thead><tr><th>Product</th><th style="text-align:right">Expected</th><th style="text-align:right">Counted</th><th style="text-align:right">Variance</th></tr></thead>
        <tbody>${rows}</tbody></table></div>`;
  }
  const rows=_takes.map(s=>{
    const totVar=(s.counts||[]).reduce((a,c)=>a+(c.variance||0),0);
    return `<tr style="cursor:pointer" onclick="openTake('${s.id}')">
      <td style="color:var(--mut)">${new Date(s.createdAt).toLocaleDateString()}</td>
      <td><b>${esc(s.name)}</b></td><td>${(s.counts||[]).length} items</td>
      <td>${s.status==='closed'?'<span class="tag green">Applied</span>':'<span class="tag" style="background:#3b3320;color:#f5c451">Open</span>'}</td>
      <td style="text-align:right;color:${totVar<0?'#f87171':(totVar>0?'#34d399':'var(--mut)')}">${s.status==='closed'?(totVar>0?'+'+totVar:totVar):'—'}</td></tr>`;
  }).join('')||'<tr><td colspan="5" style="text-align:center;color:var(--mut);padding:20px">No counts yet.</td></tr>';
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="sec-title" style="margin:0">Stock Counts</div>
      <button class="btn primary" style="flex:0;padding:10px 18px" onclick="newTake()">+ New count</button></div>
    <div class="card"><table>
      <thead><tr><th>Date</th><th>Name</th><th>Items</th><th>Status</th><th style="text-align:right">Net variance</th></tr></thead>
      <tbody>${rows}</tbody></table></div>
    <p style="font-size:12px;color:var(--mut);margin-top:12px">A count snapshots the current on-hand of every stock-tracked product. Enter what you physically counted, then apply to correct the books and record the variance.</p>`;
}
function stPaintVar(i){
  const c=_activeTake.counts[i]; const v=c.counted==null?null:(Number(c.counted)-Number(c.expected));
  const el=document.getElementById('stv-'+i); if(!el) return;
  el.textContent=v==null?'—':(v>0?'+'+v:v);
  el.style.color=v==null?'var(--mut)':(v===0?'var(--mut)':(v<0?'#f87171':'#34d399'));
}
async function newTake(){
  const name=prompt('Name this count:', 'Count '+new Date().toLocaleDateString());
  if(name===null) return;
  try{ _activeTake=await api('/stocktakes',{method:'POST',body:JSON.stringify({name})}); render(); }
  catch(e){ toast('⚠️ '+e.message); }
}
async function openTake(id){
  try{ _activeTake=await api('/stocktakes/'+id); render(); }catch(e){ toast('⚠️ '+e.message); }
}
async function saveTake(){
  try{ _activeTake=await api('/stocktakes/'+_activeTake.id,{method:'PUT',body:JSON.stringify({counts:_activeTake.counts.map(c=>({productId:c.productId,counted:c.counted}))})}); toast('💾 Saved'); }
  catch(e){ toast('⚠️ '+e.message); }
}
async function applyTake(){
  if(!confirm('Apply this count? Product stock will be set to your counted values.')) return;
  try{ await api('/stocktakes/'+_activeTake.id,{method:'PUT',body:JSON.stringify({counts:_activeTake.counts.map(c=>({productId:c.productId,counted:c.counted}))})});
    const r=await api('/stocktakes/'+_activeTake.id+'/apply',{method:'POST'});
    _activeTake=null; render(); toast('✓ Applied · '+r.adjustedProducts+' product'+(r.adjustedProducts===1?'':'s')+' adjusted'); }
  catch(e){ toast('⚠️ '+e.message); }
}

async function askQuestion(q){

async function toggleAvail(id){
  const it=_menuItems.find(i=>i.id===id); if(!it)return;
  try{ await api('/menu/'+id,{method:'PUT',body:JSON.stringify({active:it.active===false})});
    await loadMenu(); render(); toast(it.active===false?'Back on the menu':'Marked 86’d (out)'); }
  catch(e){ toast(e.offline?'📴 Needs a connection':'⚠️ '+e.message); }
}
async function moveItem(id,dir){
  const it=_menuItems.find(i=>i.id===id); if(!it)return;
  const group=_menuItems.filter(i=>i.category===it.category);
  const idx=group.findIndex(i=>i.id===id); const j=idx+dir;
  if(j<0||j>=group.length)return;
  [group[idx],group[j]]=[group[j],group[idx]];
  // build new global order: keep other categories as-is, replace this group's order
  const order=[]; const seen=new Set(group.map(g=>g.id));
  _menuItems.forEach(i=>{ if(!seen.has(i.id)) order.push(i.id); });
  group.forEach(g=>order.push(g.id));
  try{ await api('/menu/reorder',{method:'POST',body:JSON.stringify({order})}); await loadMenu(); render(); }
  catch(e){ toast(e.offline?'📴 Needs a connection':'⚠️ '+e.message); }
}
async function delItem(id){
  if(!confirm('Delete this item permanently?'))return;
  try{ await api('/menu/'+id,{method:'DELETE'}); await loadMenu(); render(); toast('Item deleted'); }
  catch(e){ toast(e.offline?'📴 Needs a connection':'⚠️ '+e.message); }
}

/* ---- LOGIN ---- */
let pinBuf='';
function loginScreen(){
  $("#app").style.display='none';
  let scr=document.getElementById('loginScreen');
  if(!scr){scr=document.createElement('div');scr.id='loginScreen';document.body.appendChild(scr);}
  scr.style.cssText='position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:200';
  const keys=[1,2,3,4,5,6,7,8,9,'C',0,'⏎'];
  scr.innerHTML=`<div style="text-align:center;width:300px">
    <div class="logo" style="margin:0 auto 14px;width:60px;height:60px;font-size:26px">T</div>
    <h2 style="margin:0 0 4px">Tavo POS</h2>
    <p style="color:var(--mut);font-size:13px;margin:0 0 18px">Enter your PIN to clock in</p>
    <div id="pinDots" style="display:flex;gap:12px;justify-content:center;margin-bottom:6px;height:20px"></div>
    <div id="pinErr" style="color:var(--red);font-size:12px;min-height:16px;margin-bottom:10px"></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
      ${keys.map(k=>`<button onclick="pinKey('${k}')" style="padding:18px;font-size:20px;font-weight:700;border-radius:14px;background:var(--panel2);border:1px solid var(--line);color:var(--txt)">${k}</button>`).join("")}
    </div>
    <p style="color:var(--mut);font-size:11px;margin-top:18px;line-height:1.6">Demo PINs · Manager <b>1234</b> · Server <b>1111</b> · Kitchen <b>3333</b></p>
  </div>`;
  drawPin();
}
function drawPin(){const d=document.getElementById('pinDots');if(d)d.innerHTML=pinBuf.split('').map(()=>'<span style="width:14px;height:14px;border-radius:50%;background:var(--brand);display:inline-block"></span>').join('')||'<span style="color:var(--mut);font-size:12px">····</span>'}
function pinKey(k){
  if(k==='C'){pinBuf='';drawPin();return}
  if(k==='⏎'){submitPin();return}
  if(pinBuf.length<6){pinBuf+=k;drawPin();if(pinBuf.length>=4){/* allow enter */}}
}
const TENANT_SLUG=new URLSearchParams(location.search).get('tenant')||'default';
async function submitPin(){
  try{
    const res=await api('/auth/login',{method:'POST',body:JSON.stringify({pin:pinBuf,tenant:TENANT_SLUG})});
    TOKEN=res.token;ME=res.user;localStorage.setItem('pp_token',TOKEN);
    pinBuf='';const scr=document.getElementById('loginScreen');if(scr)scr.remove();
    $("#app").style.display='flex';
    await startApp();
  }catch(e){pinBuf='';drawPin();const er=document.getElementById('pinErr');if(er)er.textContent=e.message}
}
function logout(silent){TOKEN=null;ME=null;localStorage.removeItem('pp_token');route='pos';if(!silent)toast('Logged out');loginScreen();}

/* ---- BOOT ---- */
function tickClock(){$("#clock").textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
async function loadMenu(){MENU=await api('/menu').catch(()=>cacheGet('/menu')||[]);CATS=[...new Set(MENU.map(m=>m.category))];if(!activeCat)activeCat=CATS[0]||''}
async function startApp(){
  try{CFG=await api('/config')}catch{}
  try{LOYALTY=await api('/loyalty/config')}catch{}
  try{ const t=await api('/tenant'); TENANT_MODE=(t&&t.mode)||(ME&&ME.tenantMode)||'restaurant'; TENANT_SETTINGS=(t&&t.settings)||{}; }catch{ TENANT_MODE=(ME&&ME.tenantMode)||'restaurant'; }
  const GW={stripe:'💳 Stripe',fiserv:'💳 Fiserv',tsys:'💳 TSYS',mock:'🧪 Mock pay'};
  $("#modebadge").textContent=(GW[CFG.paymentMode]||('💳 '+CFG.paymentMode))+(ME?` · ${ME.name} (${ME.role})`:'');
  // ensure default route is allowed for this role
  if(!((ME&&ME.routes)||[]).includes(route)) route=(ME.routes&&ME.routes[0])||'pos';
  await loadMenu();tickClock();
  if(!window._clockIv) window._clockIv=setInterval(()=>{tickClock();if(route==='kds'||route==='online')render()},30000);
  updateConn();
  if(OUTBOX.length) flushOutbox();   // sync anything queued from a previous offline session
  renderNav();render();
}
async function boot(){
  if(!TOKEN){loginScreen();return}
  try{ ME=await api('/auth/me'); await startApp(); }
  catch{ logout(true); }
}
boot();
</script>
