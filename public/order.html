<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0b0f17" />
<title>Order · Tavo</title>
<script src="https://js.stripe.com/v3/"></script>
<style>
  :root{
    --bg:#0b0f17; --panel:#131a26; --panel2:#1b2434; --line:#26324a;
    --text:#eef2f8; --muted:#93a0b5; --brand:#ff6a3d; --brand2:#ff8a5b;
    --ok:#34d399; --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  body{padding-bottom:120px}
  a{color:inherit}
  .wrap{max-width:560px;margin:0 auto;padding:0 14px}
  /* header */
  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#0b0f17 70%,rgba(11,15,23,.0));
    padding:16px 0 10px}
  .brandrow{display:flex;align-items:center;gap:10px}
  .logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--brand),var(--brand2));
    display:grid;place-items:center;font-weight:800;font-size:20px;color:#fff;box-shadow:var(--shadow)}
  .biz{font-weight:800;font-size:19px;line-height:1.1}
  .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .tablechip{margin-left:auto;background:var(--panel2);border:1px solid var(--line);
    padding:6px 11px;border-radius:999px;font-size:13px;font-weight:600;white-space:nowrap}
  /* category tabs */
  .cats{display:flex;gap:8px;overflow-x:auto;padding:12px 0 4px;scrollbar-width:none}
  .cats::-webkit-scrollbar{display:none}
  .cat{flex:0 0 auto;padding:8px 14px;border-radius:999px;background:var(--panel);
    border:1px solid var(--line);color:var(--muted);font-weight:600;font-size:14px;cursor:pointer}
  .cat.on{background:var(--brand);border-color:var(--brand);color:#fff}
  /* menu list */
  h3.sec{margin:18px 2px 8px;font-size:15px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .item{display:flex;gap:12px;align-items:center;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;padding:12px;margin-bottom:10px;box-shadow:var(--shadow)}
  .emoji{width:52px;height:52px;flex:0 0 auto;border-radius:12px;background:var(--panel2);
    display:grid;place-items:center;font-size:26px;overflow:hidden}
  .emoji img{width:100%;height:100%;object-fit:cover}
  .iname{font-weight:700;font-size:16px}
  .idesc{color:var(--muted);font-size:13px;margin-top:2px}
  .iprice{margin-left:auto;text-align:right;font-weight:700}
  .add{margin-top:6px;background:var(--brand);color:#fff;border:none;border-radius:10px;
    padding:8px 12px;font-weight:700;font-size:14px;cursor:pointer}
  /* cart bar */
  .cartbar{position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:linear-gradient(180deg,rgba(11,15,23,0),#0b0f17 22%);padding:14px;display:none}
  .cartbar .inner{max-width:560px;margin:0 auto}
  .cartbtn{width:100%;background:var(--brand);color:#fff;border:none;border-radius:14px;
    padding:15px 18px;font-weight:800;font-size:16px;display:flex;align-items:center;gap:12px;
    box-shadow:var(--shadow);cursor:pointer}
  .cartbtn .pill{background:rgba(255,255,255,.22);border-radius:999px;padding:3px 10px;font-size:14px}
  .cartbtn .amt{margin-left:auto}
  /* sheet / modal */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;display:none}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--panel);
    border-radius:22px 22px 0 0;max-width:560px;margin:0 auto;max-height:88vh;overflow:auto;
    padding:18px 16px calc(20px + env(safe-area-inset-bottom));display:none;box-shadow:var(--shadow)}
  .sheet h2{margin:2px 0 2px;font-size:20px}
  .grab{width:42px;height:5px;border-radius:3px;background:var(--line);margin:0 auto 12px}
  .grp{margin:14px 0}
  .grp .ghead{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
  .grp .gname{font-weight:700}
  .req{font-size:11px;color:var(--brand);border:1px solid var(--brand);border-radius:999px;padding:1px 7px}
  .opt{display:flex;align-items:center;gap:12px;padding:11px 12px;border:1px solid var(--line);
    border-radius:12px;margin-bottom:8px;cursor:pointer;background:var(--panel2)}
  .opt.sel{border-color:var(--brand);background:rgba(255,106,61,.12)}
  .opt .dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto}
  .opt.sel .dot{border-color:var(--brand);background:var(--brand);box-shadow:inset 0 0 0 3px var(--panel2)}
  .opt .square{border-radius:6px}
  .opt .oprice{margin-left:auto;color:var(--muted);font-weight:600}
  .qtyrow{display:flex;align-items:center;gap:14px;margin:16px 2px}
  .qtybtn{width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);
    color:var(--text);font-size:22px;font-weight:700;cursor:pointer}
  .qtyn{font-size:20px;font-weight:800;min-width:28px;text-align:center}
  .primary{width:100%;background:var(--brand);color:#fff;border:none;border-radius:14px;
    padding:15px;font-weight:800;font-size:16px;cursor:pointer;margin-top:6px}
  .primary:disabled{opacity:.5}
  .ghost{width:100%;background:transparent;color:var(--muted);border:1px solid var(--line);
    border-radius:14px;padding:13px;font-weight:700;font-size:15px;cursor:pointer;margin-top:10px}
  /* cart rows */
  .crow{display:flex;gap:10px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line)}
  .crow .cq{font-weight:800;color:var(--brand)}
  .crow .cmods{color:var(--muted);font-size:13px;margin-top:3px}
  .crow .cp{margin-left:auto;font-weight:700;white-space:nowrap}
  .crow .rm{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:4px 0;text-decoration:underline}
  .totrow{display:flex;justify-content:space-between;padding:5px 0;color:var(--muted)}
  .totrow.big{color:var(--text);font-weight:800;font-size:18px;padding-top:10px;margin-top:6px;border-top:1px solid var(--line)}
  .tips{display:flex;gap:8px;margin:12px 0}
  .tip{flex:1;padding:11px 0;border-radius:12px;border:1px solid var(--line);background:var(--panel2);
    text-align:center;font-weight:700;cursor:pointer}
  .tip.on{border-color:var(--brand);background:rgba(255,106,61,.14);color:#fff}
  input.txt{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;
    padding:13px;color:var(--text);font-size:16px;margin-top:8px}
  #card-element{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:10px}
  .note{color:var(--muted);font-size:13px;text-align:center;margin-top:10px;line-height:1.5}
  .center{text-align:center;padding:40px 16px}
  .check{width:84px;height:84px;border-radius:50%;background:rgba(52,211,153,.15);color:var(--ok);
    display:grid;place-items:center;font-size:46px;margin:0 auto 18px}
  .spin{width:34px;height:34px;border:4px solid var(--line);border-top-color:var(--brand);
    border-radius:50%;animation:sp 1s linear infinite;margin:60px auto}
  @keyframes sp{to{transform:rotate(360deg)}}
  .err{background:rgba(255,80,80,.12);border:1px solid #5a2330;color:#ffb4b4;
    border-radius:12px;padding:12px;margin:12px 0;font-size:14px;display:none}
  /* ---- kiosk mode: bigger touch targets, wider layout, attract screen ---- */
  body.kiosk .wrap{max-width:920px}
  body.kiosk .iname{font-size:20px}
  body.kiosk .add{font-size:17px;padding:12px 20px;border-radius:12px}
  body.kiosk .emoji{width:68px;height:68px;font-size:34px}
  body.kiosk .cat{font-size:17px;padding:11px 20px}
  body.kiosk .cartbtn{padding:20px;font-size:20px}
  body.kiosk .item{padding:16px}
  body.kiosk .sheet{max-width:760px;max-height:92vh}
  body.kiosk .primary,body.kiosk .ghost{padding:18px;font-size:18px}
  #attract{position:fixed;inset:0;z-index:80;background:radial-gradient(circle at 50% 35%,#15233b,#0b0f17 70%);
    display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;padding:24px}
  body.kiosk.attract-on #attract{display:flex}
  #attract .biglogo{width:120px;height:120px;border-radius:30px;background:linear-gradient(135deg,var(--brand),var(--brand2));
    display:grid;place-items:center;font-weight:800;font-size:64px;color:#fff;box-shadow:var(--shadow);margin-bottom:26px}
  #attract h1{font-size:44px;margin:0 0 10px}
  #attract p{font-size:20px;color:var(--muted);margin:0 0 38px}
  #attract .tap{background:var(--brand);color:#fff;border:none;border-radius:18px;padding:22px 56px;
    font-size:24px;font-weight:800;box-shadow:var(--shadow);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
</style>
</head>
<body>
  <div id="app">
    <div class="spin"></div>
  </div>

  <!-- Cart launcher -->
  <div class="cartbar" id="cartbar">
    <div class="inner">
      <button class="cartbtn" onclick="openCart()">
        <span class="pill" id="cartCount">0</span>
        <span>View cart</span>
        <span class="amt" id="cartTotal">$0.00</span>
      </button>
    </div>
  </div>

  <div class="scrim" id="scrim" onclick="closeSheets()"></div>

  <!-- Modifier sheet -->
  <div class="sheet" id="modSheet"></div>
  <!-- Cart sheet -->
  <div class="sheet" id="cartSheet"></div>

  <!-- Kiosk attract / welcome screen -->
  <div id="attract" onclick="startKiosk()">
    <div class="biglogo" id="attractLogo">T</div>
    <h1 id="attractTitle">Welcome</h1>
    <p>Order &amp; pay right here — no waiting in line</p>
    <button class="tap">Tap to start your order →</button>
  </div>

<script>
const API = '';                       // same-origin
const params = new URLSearchParams(location.search);
const TENANT = params.get('tenant') || 'default';
const KIOSK  = params.get('kiosk') === '1';   // unattended counter self-order
let TABLE    = params.get('table');   // may be null (takeout / kiosk pickup)
if (KIOSK) { TABLE = null; document.body.classList.add('kiosk'); }
const money = n => '$' + (Math.round(n*100)/100).toFixed(2);

let CFG = null, MENU = [], CATS = [], CART = [], current = null, tipPct = 0;
let stripe = null, cardEl = null;

async function boot(){
  try{
    const [c, m] = await Promise.all([
      fetch(API+'/api/guest/config?tenant='+encodeURIComponent(TENANT)).then(r=>r.json()),
      fetch(API+'/api/guest/menu?tenant='+encodeURIComponent(TENANT)).then(r=>r.json()),
    ]);
    if(c.error || m.error){ return fail(c.error||m.error); }
    CFG = c; MENU = m;
    CATS = [...new Set(MENU.map(i=>i.category||'Other'))];
    if(CFG.publishableKey && window.Stripe){ try{ stripe = Stripe(CFG.publishableKey); }catch(e){} }
    render();
    if(KIOSK) showAttract();
  }catch(e){ fail('Could not load the menu. Please check the link or try again.'); }
}
function showAttract(){
  const name=(CFG&&CFG.tenant&&CFG.tenant.name)||'Tavo';
  document.getElementById('attractLogo').textContent=name.trim().charAt(0).toUpperCase();
  document.getElementById('attractTitle').textContent='Welcome to '+name;
  document.body.classList.add('attract-on');
  window.scrollTo(0,0);
}
function startKiosk(){ document.body.classList.remove('attract-on'); }
function fail(msg){
  document.getElementById('app').innerHTML =
    '<div class="wrap center"><div class="logo" style="margin:40px auto 16px">T</div>'+
    '<h2>'+(msg||'Something went wrong')+'</h2>'+
    '<p class="note">If you scanned a code at your table, ask a server for help.</p></div>';
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <header><div class="wrap">
      <div class="brandrow">
        <div class="logo">${(CFG.tenant.name||'T').trim().charAt(0).toUpperCase()}</div>
        <div><div class="biz">${esc(CFG.tenant.name||'Tavo')}</div>
          <div class="sub">Order &amp; pay from your phone</div></div>
        ${TABLE?`<div class="tablechip">Table ${esc(TABLE)}</div>`:`<div class="tablechip">${KIOSK?'Self-order':'Takeout'}</div>`}
      </div>
      <div class="cats" id="cats">${CATS.map((c,i)=>`<div class="cat${i===0?' on':''}" data-c="${esc(c)}" onclick="jump('${esc(c)}',this)">${esc(c)}</div>`).join('')}</div>
    </div></header>
    <div class="wrap" id="list">${CATS.map(c=>section(c)).join('')}</div>`;
  syncCart();
}
function section(cat){
  const items = MENU.filter(i=>(i.category||'Other')===cat);
  return `<h3 class="sec" id="sec-${cssid(cat)}">${esc(cat)}</h3>` + items.map(card).join('');
}
function card(it){
  const hasMods = (it.modifierGroups||[]).length>0;
  const thumb = it.image ? `<img src="${esc(it.image)}" alt="">` : esc(it.emoji||'🍽️');
  return `<div class="item">
    <div class="emoji">${thumb}</div>
    <div style="flex:1">
      <div class="iname">${esc(it.name)}</div>
      <div class="idesc">${money(it.price)}${hasMods?' · options':''}</div>
      <button class="add" onclick='pick("${it.id}")'>Add</button>
    </div></div>`;
}
function jump(cat,el){
  document.querySelectorAll('.cat').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  const t = document.getElementById('sec-'+cssid(cat));
  if(t) window.scrollTo({top: t.getBoundingClientRect().top + window.scrollY - 120, behavior:'smooth'});
}

/* ---------- modifier picker ---------- */
function pick(id){
  const it = MENU.find(m=>m.id===id); if(!it) return;
  const groups = it.modifierGroups||[];
  if(!groups.length){ addToCart(it, [], 1); return; }
  current = { it, qty:1, sel:groups.map(()=>[]) };
  openModSheet();
}
function openModSheet(){
  const {it} = current;
  const groups = it.modifierGroups||[];
  const html = `<div class="grab"></div>
    <h2>${esc(it.name)}</h2><div class="sub" style="color:var(--muted);font-size:14px">${money(it.price)}</div>
    ${groups.map((g,gi)=>`<div class="grp">
      <div class="ghead"><span class="gname">${esc(g.name)}</span>
        ${g.required?'<span class="req">Required</span>':''}
        <span style="color:var(--muted);font-size:12px;margin-left:auto">${modHint(g)}</span></div>
      ${(g.options||[]).map((o,oi)=>`<div class="opt" data-g="${gi}" data-o="${oi}" onclick="toggleOpt(${gi},${oi})">
        <span class="dot ${maxOf(g)===1?'':'square'}"></span>
        <span>${esc(o.name)}</span>
        <span class="oprice">${o.price?'+'+money(o.price):''}</span></div>`).join('')}
    </div>`).join('')}
    <div class="qtyrow"><button class="qtybtn" onclick="bump(-1)">−</button>
      <span class="qtyn" id="qn">1</span>
      <button class="qtybtn" onclick="bump(1)">+</button>
      <button class="primary" style="flex:1;margin:0" id="addBtn" onclick="confirmAdd()"></button></div>`;
  const s = document.getElementById('modSheet'); s.innerHTML = html;
  showSheet(s); paintOpts();
}
function modHint(g){ const mn=g.min||0, mx=maxOf(g); if(mx===1) return 'Choose 1'; if(mn&&mn===mx) return 'Choose '+mn; if(mn) return 'Choose '+mn+'–'+mx; return 'Up to '+mx; }
function maxOf(g){ return g.max||g.options.length||1; }
function toggleOpt(gi,oi){
  const g = current.it.modifierGroups[gi]; const sel = current.sel[gi];
  const mx = maxOf(g);
  const at = sel.indexOf(oi);
  if(mx===1){ current.sel[gi] = at>-1?[]:[oi]; }
  else if(at>-1){ sel.splice(at,1); }
  else { if(sel.length>=mx) sel.shift(); sel.push(oi); }
  paintOpts();
}
function paintOpts(){
  document.querySelectorAll('#modSheet .opt').forEach(el=>{
    const gi=+el.dataset.g, oi=+el.dataset.o;
    el.classList.toggle('sel', current.sel[gi].includes(oi));
  });
  document.getElementById('qn').textContent = current.qty;
  const ok = (current.it.modifierGroups||[]).every((g,gi)=> !g.required || current.sel[gi].length >= (g.min||1));
  const btn = document.getElementById('addBtn');
  btn.disabled = !ok;
  btn.textContent = ok ? ('Add · '+money(linePrice(current)*current.qty)) : 'Choose required options';
}
function bump(d){ current.qty = Math.max(1, Math.min(20, current.qty+d)); paintOpts(); }
function linePrice(c){
  let p = c.it.price;
  c.it.modifierGroups.forEach((g,gi)=> c.sel[gi].forEach(oi=> p += Number(g.options[oi].price||0)));
  return Math.round(p*100)/100;
}
function confirmAdd(){
  const mods = [];
  current.it.modifierGroups.forEach((g,gi)=> current.sel[gi].forEach(oi=>{
    const o=g.options[oi]; mods.push(o.price?`${o.name} (+$${Number(o.price).toFixed(2)})`:o.name);
  }));
  addToCart(current.it, mods, current.qty);
  closeSheets();
}
function addToCart(it, mods, qty){
  const key = it.id+'|'+mods.join(',');
  const found = CART.find(l=>l.key===key);
  if(found) found.qty += qty;
  else CART.push({ key, id:it.id, name:it.name, price:it.price, mods, qty });
  syncCart(); bumpToast();
}

/* ---------- cart ---------- */
function cartTotals(){
  const sub = CART.reduce((a,l)=>{
    const m = l.mods.reduce((s,x)=>{const z=String(x).match(/\+\$([0-9.]+)/);return s+(z?parseFloat(z[1]):0);},0);
    return a + (l.price+m)*l.qty;
  },0);
  const tax = Math.round(sub*(CFG.taxRate||0)*100)/100;
  const tip = Math.round(sub*tipPct*100)/100;
  const total = Math.round((sub+tax+tip)*100)/100;
  return { sub:Math.round(sub*100)/100, tax, tip, total };
}
function syncCart(){
  const n = CART.reduce((a,l)=>a+l.qty,0);
  const t = cartTotals();
  document.getElementById('cartbar').style.display = n? 'block':'none';
  document.getElementById('cartCount').textContent = n;
  document.getElementById('cartTotal').textContent = money(t.total);
}
function bumpToast(){
  const b = document.querySelector('.cartbtn'); if(!b) return;
  b.style.transform='scale(1.03)'; setTimeout(()=>b.style.transform='',150);
}
function openCart(){
  if(!CART.length) return;
  const t = cartTotals();
  const s = document.getElementById('cartSheet');
  s.innerHTML = `<div class="grab"></div><h2>Your order</h2>
    <div class="sub" style="color:var(--muted);font-size:14px">${TABLE?('Table '+esc(TABLE)):'Takeout'} · ${esc(CFG.tenant.name||'Tavo')}</div>
    <div style="margin-top:10px">${CART.map(crow).join('')}</div>
    <div style="margin-top:14px">
      <div class="totrow"><span>Subtotal</span><span>${money(t.sub)}</span></div>
      <div class="totrow"><span>Tax</span><span>${money(t.tax)}</span></div>
      <div class="sub" style="margin-top:14px;font-weight:700;color:var(--text)">Add a tip</div>
      <div class="tips" id="tips">
        ${[0,0.15,0.18,0.20].map(p=>`<div class="tip${p===tipPct?' on':''}" onclick="setTip(${p})">${p?Math.round(p*100)+'%':'None'}</div>`).join('')}
      </div>
      <div class="totrow big"><span>Total</span><span id="grand">${money(t.total)}</span></div>
    </div>
    <input class="txt" id="guestName" placeholder="Your name (optional)" maxlength="40" />
    <div class="err" id="payErr"></div>
    <div id="payArea"></div>
    <button class="primary" id="payBtn" onclick="startPay()">Pay ${money(t.total)} now</button>
    <button class="ghost" onclick="placeUnpaid()">Place order — pay at table</button>
    <div class="note">You're ordering directly from your table. Items go straight to the kitchen once paid.</div>`;
  showSheet(s);
}
function crow(l){
  const mods = l.mods.length? `<div class="cmods">${l.mods.map(esc).join(', ')}</div>`:'';
  const each = l.price + l.mods.reduce((s,x)=>{const z=String(x).match(/\+\$([0-9.]+)/);return s+(z?parseFloat(z[1]):0);},0);
  return `<div class="crow"><span class="cq">${l.qty}×</span>
    <div style="flex:1"><div style="font-weight:700">${esc(l.name)}</div>${mods}
      <button class="rm" onclick="rm('${l.key}')">Remove</button></div>
    <span class="cp">${money(each*l.qty)}</span></div>`;
}
function rm(key){ CART = CART.filter(l=>l.key!==key); syncCart(); if(CART.length) openCart(); else closeSheets(); }
function setTip(p){ tipPct=p; openCart(); }

/* ---------- checkout ---------- */
function payload(){
  return {
    tenant: TENANT,
    table: TABLE!=null ? Number(TABLE) : null,
    name: (document.getElementById('guestName')||{}).value || '',
    lines: CART.map(l=>({ id:l.id, name:l.name, qty:l.qty, mods:l.mods })),
    tip: cartTotals().tip,
  };
}
function showErr(m){ const e=document.getElementById('payErr'); if(e){e.textContent=m;e.style.display='block';} }

async function placeUnpaid(){
  setBusy(true);
  try{
    const r = await fetch(API+'/api/guest/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())}).then(r=>r.json());
    if(r.error) { setBusy(false); return showErr(r.error); }
    done(r.order, false);
  }catch(e){ setBusy(false); showErr('Could not place your order. Try again.'); }
}

async function startPay(){
  showErr('');
  const t = cartTotals();
  // No real gateway configured → mock confirm in one tap.
  if(!stripe){
    setBusy(true);
    try{
      const intent = await fetch(API+'/api/guest/pay/intent',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())}).then(r=>r.json());
      if(intent.error){ setBusy(false); return showErr(intent.error); }
      const r = await fetch(API+'/api/guest/pay/complete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...payload(), intentId:intent.id})}).then(r=>r.json());
      if(r.error){ setBusy(false); return showErr(r.error); }
      done(r.order, true);
    }catch(e){ setBusy(false); showErr('Payment failed. Try again.'); }
    return;
  }
  // Stripe path: mount card field, then confirm.
  if(!cardEl){
    document.getElementById('payArea').innerHTML = '<div id="card-element"></div>';
    const elements = stripe.elements();
    cardEl = elements.create('card',{style:{base:{color:'#eef2f8',fontSize:'16px','::placeholder':{color:'#93a0b5'}}}});
    cardEl.mount('#card-element');
    document.getElementById('payBtn').textContent = 'Pay '+money(t.total);
    return; // first tap reveals the card field; second tap pays
  }
  setBusy(true);
  try{
    const intent = await fetch(API+'/api/guest/pay/intent',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())}).then(r=>r.json());
    if(intent.error){ setBusy(false); return showErr(intent.error); }
    const res = await stripe.confirmCardPayment(intent.clientSecret,{payment_method:{card:cardEl}});
    if(res.error){ setBusy(false); return showErr(res.error.message); }
    const r = await fetch(API+'/api/guest/pay/complete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...payload(), intentId:intent.id})}).then(r=>r.json());
    if(r.error){ setBusy(false); return showErr(r.error); }
    done(r.order, true);
  }catch(e){ setBusy(false); showErr('Payment failed. Try again.'); }
}
function setBusy(b){
  const btn=document.getElementById('payBtn'); if(btn){ btn.disabled=b; btn.style.opacity=b?.6:1; if(b) btn.textContent='Processing…'; }
}
function done(order, paid){
  CART=[]; syncCart();
  const where = TABLE?('Table '+esc(TABLE)):(KIOSK?'Pickup at counter':'Takeout');
  const pickup = KIOSK ? `<div style="font-size:40px;font-weight:800;color:var(--brand);margin:6px 0 2px">#${order.number}</div><p class="note" style="margin-top:0">Listen for your number at the counter</p>` : '';
  document.getElementById('app').innerHTML = `<div class="wrap center">
    <div class="check">✓</div>
    <h2>${paid?'Payment received':'Order placed'}</h2>
    ${pickup}
    <p class="note">${KIOSK?'':('Order #'+order.number+' · ')}${money(order.total)}<br>
    ${paid?(KIOSK?'Your order is being prepared.':'Your order is on its way to the kitchen.'):'Flag your server when ready to pay.'}<br>
    ${where} · ${esc(CFG.tenant.name||'Tavo')}</p>
    <button class="primary" style="max-width:280px;margin:18px auto 0" onclick="${KIOSK?'kioskReset()':'location.reload()'}">${KIOSK?'Start a new order':'Order more'}</button>
    ${KIOSK?'<p class="note" id="kioskCountdown" style="margin-top:14px"></p>':''}
  </div>`;
  closeSheets(); window.scrollTo(0,0);
  if(KIOSK){
    let s=12; const el=()=>document.getElementById('kioskCountdown');
    if(el()) el().textContent='Returning to start in '+s+'s…';
    clearInterval(window._kioskIv);
    window._kioskIv=setInterval(()=>{ s--; if(el())el().textContent='Returning to start in '+s+'s…'; if(s<=0){clearInterval(window._kioskIv);kioskReset();} },1000);
  }
}
function kioskReset(){ clearInterval(window._kioskIv); location.reload(); }

/* ---------- sheet plumbing ---------- */
function showSheet(s){ document.getElementById('scrim').style.display='block';
  document.querySelectorAll('.sheet').forEach(x=>x.style.display='none'); s.style.display='block'; }
function openCartSheet(){ openCart(); }
function closeSheets(){ document.getElementById('scrim').style.display='none';
  document.querySelectorAll('.sheet').forEach(x=>x.style.display='none'); current=null; }

/* ---------- utils ---------- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function cssid(s){ return String(s).replace(/[^a-z0-9]/gi,'_'); }
boot();
